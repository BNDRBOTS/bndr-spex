<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in | BNDR | SPEX</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body class="auth-body">
  <main class="auth-shell">
    <section class="auth-card">
      <a class="brand auth-brand" href="/">BNDR<span>SPEX</span></a>
      <h1>Sign in to BNDR | SPEX.</h1>
      <p>Create an account to save specs, use paid credits, and manage billing.</p>
      <form id="auth-form" class="stack">
        <label>Email<input id="email" type="email" autocomplete="email" required></label>
        <label>Password<input id="password" type="password" autocomplete="current-password" minlength="8" required></label>
        <div class="grid-two">
          <button class="button" type="submit" data-action="signin">Sign in</button>
          <button class="button button-secondary" type="button" id="signup">Create account</button>
        </div>
      </form>
      <p id="auth-message" class="message" role="status"></p>
    </section>
  </main>
  <script src="/env.js"></script>
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm';
    const message = document.getElementById('auth-message');
    const env = window.HD_ENV || {};
    if (!env.SUPABASE_URL || !env.SUPABASE_ANON_KEY) {
      message.textContent = 'Sign-in is not connected yet. Contact support.';
    }
    const supabase = createClient(env.SUPABASE_URL || 'https://missing.supabase.co', env.SUPABASE_ANON_KEY || 'missing');
    const existing = await supabase.auth.getSession();
    if (existing.data.session) window.location.href = '/app.html';

    function values() {
      return {
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value
      };
    }
    function setMessage(text) { message.textContent = text; }

    document.getElementById('auth-form').addEventListener('submit', async (event) => {
      event.preventDefault();
      setMessage('Signing in...');
      const { email, password } = values();
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return setMessage(error.message);
      window.location.href = '/app.html';
    });

    document.getElementById('signup').addEventListener('click', async () => {
      setMessage('Creating account...');
      const { email, password } = values();
      const { data, error } = await supabase.auth.signUp({ email, password });
      if (error) return setMessage(error.message);
      if (data && data.session) {
        window.location.href = '/app.html';
        return;
      }
      setMessage('Account created. Check your email to confirm it, then sign in.');
    });
  </script>
</body>
</html>
