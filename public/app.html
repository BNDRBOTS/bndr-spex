<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>App | BNDR | SPEX</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <header class="site-header app-header">
    <a class="brand" href="/">BNDR<span>SPEX</span></a>
    <nav class="nav">
      <span id="account-label" class="muted"></span>
      <button id="portal" class="button button-secondary button-small">Billing</button>
      <button id="signout" class="button button-small">Sign out</button>
    </nav>
  </header>

  <main class="app-shell">
    <aside class="sidebar">
      <section class="card compact">
        <p class="eyebrow">Account</p>
        <h2 id="plan-status">Loading</h2>
        <p id="credit-status" class="muted"></p>
      </section>
      <section class="card compact">
        <p class="eyebrow">Payments</p>
        <button id="buy-single" class="button button-full" data-single-label>Buy one spec</button>
        <button id="buy-monthly" class="button button-secondary button-full" data-monthly-label>Subscribe monthly</button>
      </section>
      <section class="card compact specs-panel">
        <div class="between">
          <p class="eyebrow">Saved specs</p>
          <button id="refresh" class="link-button">Refresh</button>
        </div>
        <div id="spec-list" class="saved-list"></div>
      </section>
    </aside>

    <section class="workspace">
      <div class="tool-tabs" role="tablist" aria-label="Generator mode">
        <button class="tab active" data-mode="system">System Spec</button>
        <button class="tab" data-mode="schema">HOLY DIVINE Schema</button>
      </div>

      <form id="generate-form" class="generator card">
        <div class="form-head">
          <div>
            <p class="eyebrow" id="mode-eyebrow">Implementation-grade spec generator</p>
            <h1 id="mode-title">Generate full system specification.</h1>
          </div>
          <button class="button" type="submit">Generate</button>
        </div>
        <label>Goal description<textarea id="goal_description" required minlength="8" rows="5"></textarea></label>
        <div id="system-fields" class="grid-two">
          <label>Runtime model<input id="runtime_model"></label>
          <label>System scope<input id="system_scope"></label>
          <label>Target platforms<input id="target_platforms"></label>
          <label>Constraints<input id="constraints"></label>
          <label>Dependencies<textarea id="dependencies" rows="3"></textarea></label>
          <label>Design requirements<textarea id="design_requirements" rows="3"></textarea></label>
          <label>Data requirements<textarea id="data_requirements" rows="3"></textarea></label>
        </div>
        <div id="schema-fields" class="grid-two hidden">
          <label>Runtime model<input id="schema_runtime_model"></label>
          <label>Constraints<input id="schema_constraints"></label>
          <label class="span-two">Dependencies<textarea id="schema_dependencies" rows="3"></textarea></label>
        </div>
      </form>

      <section class="output-grid">
        <article class="card output-card">
          <div class="between">
            <div>
              <p class="eyebrow">Generated output</p>
              <h2 id="output-title">Nothing generated yet</h2>
            </div>
            <div class="button-row">
              <button id="copy-output" class="button button-secondary button-small">Copy</button>
              <button id="download-output" class="button button-secondary button-small">Download</button>
            </div>
          </div>
          <pre id="output" class="output-box"></pre>
        </article>
        <article class="card detail-card">
          <div class="between">
            <div>
              <p class="eyebrow">Saved detail</p>
              <h2 id="detail-title">Select a saved spec</h2>
            </div>
            <button id="delete-spec" class="button button-danger button-small hidden">Delete</button>
          </div>
          <label class="hidden" id="rename-wrap">Rename<input id="rename-input"></label>
          <pre id="detail-output" class="output-box small"></pre>
        </article>
      </section>
    </section>
  </main>

  <div id="toast" class="toast" role="status"></div>
  <script src="/env.js"></script>
  <script type="module" src="/app.js"></script>
</body>
</html>
